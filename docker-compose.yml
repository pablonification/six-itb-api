# SIX API Docker Compose
# For VPS deployment

services:
  six-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: six-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server Configuration
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - LOG_LEVEL=info

      # CORS (change this to your domain in production)
      - CORS_ORIGIN=*

      # Database paths (inside container)
      - DB_PATH=/app/data/sessions.db
      - API_KEY_DB_PATH=/app/data/api_keys.db

      # Authentication
      - API_KEY_ENABLED=true
      # IMPORTANT: Change this to a secure random key!
      # Generate with: openssl rand -hex 32
      - MASTER_ADMIN_KEY=${MASTER_ADMIN_KEY:-change-me-in-production}

      # Browser
      - BROWSER_HEADLESS=true

    volumes:
      # Persist database files
      - ./data:/app/data

    # Resource limits (adjust based on your VPS)
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

